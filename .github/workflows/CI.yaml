name: CI

on:
  push:
    branches:
      - main

jobs:
  frontend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: "22"

      - name: Instal dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build 

  backend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Check backend imports
        env:
          SPOTIFY_CLIENT_ID: test
          SPOTIFY_CLIENT_SECRET: test
          DATABASE_URL: sqlite:///test.db
          SECRET_KEY: test-secret
        run: |
          cd backend
          python -c "import main"
  
  docker-build:
    runs-on: ubuntu-latest

    needs:
      - frontend-ci
      - backend-ci

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 

      - name: LogIn to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/moodmap-backend:latest ./backend

      - name: Push backend image
        run: docker push ghcr.io/${{ github.repository_owner }}/moodmap-backend:latest

      - name: Build frontend image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/moodmap-frontend:latest ./frontend

      - name: Push frontend image
        run: docker push ghcr.io/${{ github.repository_owner }}/moodmap-frontend:latest
